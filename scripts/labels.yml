# Standard labels for all repositories
# Used by sync-labels.go to ensure consistency

# Type labels
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "type:feature"
  color: "a2eeef"
  description: "New feature or request"

- name: "type:docs"
  color: "0075ca"
  description: "Documentation improvements"

- name: "type:refactor"
  color: "d4c5f9"
  description: "Code refactoring (no functional change)"

- name: "type:ci"
  color: "e8d44d"
  description: "CI/CD and workflow changes"

- name: "type:chore"
  color: "ededed"
  description: "Maintenance and housekeeping"

- name: "type:security"
  color: "e11d48"
  description: "Security-related changes"

- name: "type:test"
  color: "bfd4f2"
  description: "Test additions or updates"

- name: "type:infra"
  color: "f9a825"
  description: "Infrastructure changes (Terraform, deployment)"

# Priority labels
- name: "priority:critical"
  color: "b60205"
  description: "Must be addressed immediately"

- name: "priority:high"
  color: "d93f0b"
  description: "Should be addressed soon"

- name: "priority:medium"
  color: "fbca04"
  description: "Normal priority"

- name: "priority:low"
  color: "0e8a16"
  description: "Nice to have, no rush"

# Status labels
- name: "status:blocked"
  color: "b60205"
  description: "Blocked by external dependency"

- name: "status:in-progress"
  color: "0052cc"
  description: "Currently being worked on"

- name: "status:needs-review"
  color: "006b75"
  description: "Ready for review"

- name: "status:stale"
  color: "8a6d3b"
  description: "Marked stale due to inactivity"

- name: "status:wontfix"
  color: "ffffff"
  description: "Will not be addressed"

- name: "status:duplicate"
  color: "cfd3d7"
  description: "Duplicate of another issue"

- name: "sla:breached"
  color: "b60205"
  description: "SLA breached — critical/high priority issue idle too long"

- name: "sla:warning"
  color: "e99695"
  description: "SLA warning — high priority issue approaching deadline"

# Size labels (auto-applied by pr-size.yml workflow)
- name: "size/xs"
  color: "3cbf00"
  description: "Extra small PR (≤10 lines)"

- name: "size/s"
  color: "5d9801"
  description: "Small PR (≤100 lines)"

- name: "size/m"
  color: "7f7203"
  description: "Medium PR (≤200 lines)"

- name: "size/l"
  color: "a14c05"
  description: "Large PR (≤500 lines)"

- name: "size/xl"
  color: "c32607"
  description: "Extra large PR (>500 lines)"

# Automation labels
- name: "sync"
  color: "0e8a16"
  description: "File sync PR from .github SSoT"

- name: "auto-merge"
  color: "0e8a16"
  description: "PR approved for automatic merge"

- name: "codex"
  color: "7057ff"
  description: "Codex AI automation trigger"

- name: "keep-open"
  color: "0e8a16"
  description: "Exempt from stale bot auto-close"

- name: "pinned"
  color: "006b75"
  description: "Exempt from stale bot — permanently tracked"

# Risk labels (used by issue-lifecycle merge comments)
- name: "risk:high"
  color: "b60205"
  description: "High-risk change — requires careful review"

- name: "risk:medium"
  color: "fbca04"
  description: "Medium-risk change — standard review"

- name: "risk:low"
  color: "0e8a16"
  description: "Low-risk change — minimal review needed"
