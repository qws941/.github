name: Codex PR Review (Reusable)

on:
  workflow_call:

permissions:
  pull-requests: write
  contents: read

jobs:
  codex-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba023e95a2965a89232d3dfe59342 # v2.7.0
        with:
          egress-policy: audit

      - name: Trigger Codex review
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const pr = context.payload.pull_request;

            const body = [
              `@codex Review this PR`,
              '',
              `**Title:** ${pr.title}`,
              `**Branch:** ${pr.head.ref} → ${pr.base.ref}`,
              `**Changed files:** ${pr.changed_files}`,
              '',
              'Review focus:',
              '- Hardcoded secrets, credentials, or API keys',
              '- Action version pinning (full SHA, not mutable tags)',
              '- Type safety violations (as any, @ts-ignore, @ts-expect-error)',
              '- Empty catch blocks or suppressed errors',
              '- Code style and naming convention compliance',
            ].join(String.fromCharCode(10));

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body
            });
