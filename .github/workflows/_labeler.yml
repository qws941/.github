# Reusable PR Labeler Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     labeler:
#       uses: qws941/.github/.github/workflows/_labeler.yml@master

name: PR Labeler (Reusable)

on:
  workflow_call:

jobs:
  labeler:
    name: Label PRs
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Label
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ github.token }}
          sync-labels: true
