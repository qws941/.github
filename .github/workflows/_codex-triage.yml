# Reusable Codex Triage Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Enhanced triage with:
#   - Title keyword matching (failure, deploy, build, ELK, health, drift)
#   - Label-based matching using standard labels (type:ci, type:infra, type:security)
#   - Dedup check (skips if @codex comment already exists)
#   - Context-aware investigation prompts (ELK, infra, drift, generic)
#   - Auto-assigns Codex bot to the issue
#
# Usage:
#   jobs:
#     triage:
#       uses: qws941/.github/.github/workflows/_codex-triage.yml@master

name: Codex Triage (Reusable)

on:
  workflow_call:

jobs:
  triage:
    name: Triage failure issues
    runs-on: ubuntu-latest
    if: >-
      (github.event.action == 'opened' && (
        contains(github.event.issue.title, 'failed') ||
        contains(github.event.issue.title, 'failure') ||
        contains(github.event.issue.title, 'Failed') ||
        contains(github.event.issue.title, 'Failure') ||
        contains(github.event.issue.title, '[Deploy') ||
        contains(github.event.issue.title, '[Build') ||
        contains(github.event.issue.title, '[Docker') ||
        contains(github.event.issue.title, '[ELK Alert]') ||
        contains(github.event.issue.title, '[Health') ||
        contains(github.event.issue.title, '[Runner') ||
        contains(github.event.issue.title, '[Drift') ||
        contains(github.event.issue.title, 'Apply failed') ||
        contains(github.event.issue.title, 'Plan failed') ||
        contains(github.event.issue.title, '[CI]') ||
        contains(github.event.issue.title, '[Secret') ||
        contains(github.event.issue.title, '[MCP') ||
        contains(github.event.issue.title, '[Cloudflare') ||
        contains(github.event.issue.title, '[Terraform') ||
        contains(github.event.issue.title, 'Security Scan')
      )) ||
      (github.event.action == 'labeled' &&
        github.event.label.name != 'codex' && (
        github.event.label.name == 'type:ci' ||
        github.event.label.name == 'type:infra' ||
        github.event.label.name == 'type:security'
      ))
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba023e95a2965a89232d3dfe59342 # v2.7.0
        with:
          egress-policy: audit

      - name: Check for existing Codex comment
        id: dedup
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          result-encoding: string
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const hasCodex = comments.data.some(c => c.body.includes('@codex'));
            return hasCodex ? 'skip' : 'proceed';

      - name: Request Codex investigation and assign
        if: steps.dedup.outputs.result == 'proceed'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const labels = issue.labels.map(l => l.name);

            let prompt;

            if (title.includes('[ELK Alert]')) {
              prompt = [
                '@codex Investigate this ELK alert.',
                '',
                'Context: This issue was auto-created by the ELK error detection pipeline.',
                'The alert fired because tier 1-2 errors exceeded the threshold.',
                '',
                'Steps:',
                '1. Parse the alert details from the issue body (service, classification, severity, tier)',
                '2. Query the ELK stack for related log entries around the alert timestamp',
                '3. Check if the affected service is currently healthy',
                '4. Identify the root cause — check recent deployments, config changes, or upstream dependencies',
                '5. If the fix is code-related, create a PR targeting the affected service',
                '6. If it is infrastructure or transient, summarize findings and recommended remediation steps',
              ];
            } else if (
              title.includes('[Health') ||
              title.includes('[Runner') ||
              labels.includes('type:infra')
            ) {
              prompt = [
                '@codex Investigate this infrastructure issue.',
                '',
                'Steps:',
                '1. Check the health status of the affected service or runner',
                '2. Review recent system metrics (CPU, memory, disk, network)',
                '3. Check if the issue correlates with recent deployments or config changes',
                '4. If a service is down, check Docker container logs and restart status',
                '5. Summarize the current state and recommended recovery steps',
              ];
            } else if (title.includes('[Drift')) {
              prompt = [
                '@codex Investigate this Terraform drift.',
                '',
                'Steps:',
                '1. Identify which resources have drifted from the Terraform state',
                '2. Determine if the drift was caused by manual changes or external automation',
                '3. If safe to reconcile, create a PR to update the Terraform configuration',
                '4. If the drift is intentional, document why and update the state accordingly',
              ];
            } else {
              prompt = [
                '@codex Investigate this failure.',
                '',
                'Steps:',
                '1. Check the workflow run logs linked in this issue',
                '2. Identify the root cause of the failure',
                '3. If the issue is code-related, create a fix PR',
                '4. If it is a credential, infrastructure, or transient issue, summarize findings and recommended next steps',
              ];
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: prompt.join('\n'),
            });

            // Assign Codex bot via GraphQL (REST silently ignores bot accounts)
            try {
              const mutation = `mutation($issueId: ID!, $assigneeIds: [ID!]!) {
                addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: $assigneeIds}) {
                  clientMutationId
                }
              }`;
              await github.graphql(mutation, {
                issueId: issue.node_id,
                assigneeIds: ['BOT_kgDODnSAjQ'],
              });
            } catch (error) {
              core.warning(`Failed to assign Codex: ${error.message}`);
            }

            // Defensive: always remove repo owner (webhook payload assignees are stale)
            const owner = context.repo.owner;
            try {
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [owner],
              });
              core.info(`Ensured owner ${owner} is not assigned to issue #${issue.number}`);
            } catch (e) {
              core.warning(`Failed to remove owner: ${e.message}`);
            }

            // Add 'codex' label for tracking and downstream triggers
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['codex'],
            });
