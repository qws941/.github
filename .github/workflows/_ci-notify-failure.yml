# Reusable CI Failure Notification Workflow
# SSoT: qws941-lab/.github — do not duplicate in consuming repos
#
# Creates a GitHub Issue when a CI workflow fails. Deduplicates by title prefix:
# if an open issue with the same prefix exists, adds a comment instead.
#
# Usage:
#   jobs:
#     notify:
#       if: failure()
#       uses: qws941-lab/.github/.github/workflows/_ci-notify-failure.yml@master
#       with:
#         title-prefix: '[CI] Build failed'

name: CI Notify Failure

on:
  workflow_call:
    inputs:
      title-prefix:
        description: 'Title prefix for dedup matching and default title generation'
        required: false
        type: string
        default: ''
      labels:
        description: 'Comma-separated labels for the issue'
        required: false
        type: string
        default: 'bug,automation,ci-failure'
      extra-body:
        description: 'Additional context to append to auto-generated body'
        required: false
        type: string
        default: ''

jobs:
  notify:
    name: Create failure issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          INPUT_TITLE_PREFIX: ${{ inputs.title-prefix }}
          INPUT_EXTRA_BODY: ${{ inputs.extra-body }}
          INPUT_LABELS: ${{ inputs.labels }}
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const serverUrl = context.serverUrl;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = serverUrl + '/' + owner + '/' + repo + '/actions/runs/' + runId;
            const commit = context.sha.substring(0, 7);
            const commitUrl = serverUrl + '/' + owner + '/' + repo + '/commit/' + context.sha;
            const inputPrefix = process.env.INPUT_TITLE_PREFIX || '';
            const extraBody = process.env.INPUT_EXTRA_BODY || '';
            const labels = (process.env.INPUT_LABELS || 'bug,automation,ci-failure')
              .split(',')
              .map(l => l.trim())
              .filter(Boolean);

            // Build title — use input prefix or derive from workflow_run context
            let titlePrefix;
            if (inputPrefix) {
              titlePrefix = inputPrefix;
            } else if (context.payload.workflow_run) {
              titlePrefix = '[' + context.payload.workflow_run.name + '] Failed';
            } else {
              titlePrefix = '[' + context.workflow + '] Failed';
            }
            const issueTitle = titlePrefix + ' (' + today + ')';

            // Build body
            const workflowName = context.payload.workflow_run
              ? context.payload.workflow_run.name
              : context.workflow;
            const workflowUrl = context.payload.workflow_run
              ? context.payload.workflow_run.html_url
              : runUrl;

            let body = [
              '## Workflow Failure',
              '',
              '**Date:** ' + today,
              '**Commit:** [`' + commit + '`](' + commitUrl + ')',
              '**Triggered by:** ' + context.actor,
              '**Workflow:** ' + workflowName,
              '**Run:** [View logs](' + workflowUrl + ')',
            ].join('\n');

            if (extraBody) {
              body += '\n\n' + extraBody;
            }

            body += '\n\n' + [
              '### Action Required',
              '- [ ] Check the [workflow run](' + workflowUrl + ') for error details',
              '- [ ] Fix the root cause and re-run',
              '- [ ] Close this issue when resolved',
              '',
              '---',
              '*Auto-generated by ' + workflowName + '*',
            ].join('\n');

            // Dedup: search for existing open issue with same prefix
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100,
            });

            const duplicate = existingIssues.find(issue =>
              issue.title.startsWith(titlePrefix)
            );

            if (duplicate) {
              const commentBody = [
                '## Recurring Failure (' + today + ')',
                '',
                '**Commit:** [`' + commit + '`](' + commitUrl + ')',
                '**Triggered by:** ' + context.actor,
                '**Run:** [View logs](' + workflowUrl + ')',
                '',
                'This workflow failed again. See the run logs for details.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: duplicate.number,
                body: commentBody,
              });

              core.info('Updated existing issue #' + duplicate.number);
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels,
              });
            }
