# Reusable CI Workflow Notification Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Creates a GitHub Issue when a CI workflow ends in an unhealthy state.
# Automatically closes matching issues when the workflow recovers (success).
# Deduplicates by stable workflow-family prefix.
#
# Usage:
#   jobs:
#     notify:
#       uses: qws941/.github/.github/workflows/_ci-notify-failure.yml@master

name: CI Notify Failure (Reusable)

on:
  workflow_call:
    inputs:
      title-prefix:
        description: 'Title prefix for dedup matching and default title generation'
        required: false
        type: string
        default: ''
      labels:
        description: 'Comma-separated labels for the issue'
        required: false
        type: string
        default: 'type:ci,priority:high,opencode-agent'
      extra-body:
        description: 'Additional context to append to auto-generated body'
        required: false
        type: string
        default: ''

jobs:
  notify:
    name: Create or resolve workflow issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Create or resolve workflow issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          INPUT_TITLE_PREFIX: ${{ inputs.title-prefix }}
          INPUT_EXTRA_BODY: ${{ inputs.extra-body }}
          INPUT_LABELS: ${{ inputs.labels }}
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const today = new Date().toISOString().split('T')[0];
            const serverUrl = context.serverUrl;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.runId;
            const runUrl = serverUrl + '/' + owner + '/' + repo + '/actions/runs/' + runId;
            const commit = context.sha.substring(0, 7);
            const commitUrl = serverUrl + '/' + owner + '/' + repo + '/commit/' + context.sha;
            const inputPrefix = process.env.INPUT_TITLE_PREFIX || '';
            const extraBody = process.env.INPUT_EXTRA_BODY || '';
            const labels = (process.env.INPUT_LABELS || 'type:ci,priority:high,opencode-agent')
              .split(',')
              .map(l => l.trim())
              .filter(Boolean);

            // GraphQL mutation for assigning Codex bot
            const assignMutation = `mutation($issueId: ID!, $assigneeIds: [ID!]!) {
              addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: $assigneeIds}) {
                clientMutationId
              }
            }`;

            const workflowRun = context.payload.workflow_run || null;
            const workflowRunId = workflowRun?.id || context.runId;
            const rawConclusion = workflowRun?.conclusion || 'failure';

            // Derive workflow identity
            const workflowName = workflowRun
              ? workflowRun.name
              : context.workflow;
            const workflowUrl = workflowRun
              ? workflowRun.html_url
              : runUrl;

            // Stable family prefix: "[WorkflowName]" without conclusion — used for dedup and recovery matching
            const familyPrefix = inputPrefix || ('[' + workflowName + ']');
            const familyMarker = `<!-- ci-notify-failure:workflow=${workflowName} -->`;

            // Determine if this is a recovery (success) or unhealthy conclusion
            const unhealthyConclusions = ['failure', 'timed_out', 'action_required', 'cancelled'];
            const isRecovery = rawConclusion === 'success';

            // Find existing open issues for this workflow family
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labels.join(','),
              per_page: 100,
            });

            // Match by body marker first (precise), then title-prefix fallback (legacy issues)
            const matchingIssues = existingIssues.filter(issue => {
              if ((issue.body || '').includes(familyMarker)) {
                return true;
              }
              return issue.title.startsWith(familyPrefix + ' ');
            });

            // ── Recovery path: close matching issues when workflow succeeds ──
            if (isRecovery) {
              if (matchingIssues.length === 0) {
                core.info('Workflow recovered but no open issues to close for family: ' + familyPrefix);
                return;
              }

              const recoveryMarker = `<!-- ci-notify-failure:recovered:run-id=${workflowRunId} -->`;

              for (const issue of matchingIssues) {
                // Idempotency: skip if already recovered by this run
                const { data: comments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number: issue.number,
                  per_page: 100,
                });

                if (comments.some(c => (c.body || '').includes(recoveryMarker))) {
                  core.info('Recovery already logged for run #' + workflowRunId + ' on issue #' + issue.number);
                  continue;
                }

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    recoveryMarker,
                    '## CI Recovered',
                    '',
                    'Workflow **' + workflowName + '** completed successfully on ' + today + '.',
                    '',
                    '**Commit:** [`' + commit + '`](' + commitUrl + ')',
                    '**Run:** [View logs](' + workflowUrl + ')',
                    '',
                    'Closing this issue automatically.',
                  ].join('\n'),
                });

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                });

                core.info('Closed recovered issue #' + issue.number);
              }

              return;
            }

            // ── Failure path: create or update issue ──
            // Only act on known unhealthy conclusions; skip neutral/skipped/unknown
            if (!unhealthyConclusions.includes(rawConclusion)) {
              core.info('Ignoring non-actionable conclusion: ' + rawConclusion);
              return;
            }

            const conclusionMap = {
              failure: 'Failed',
              timed_out: 'Timed Out',
              action_required: 'Action Required',
              cancelled: 'Cancelled',
            };
            const conclusionLabel = conclusionMap[rawConclusion] || rawConclusion
              .split('_')
              .map(word => word.charAt(0).toUpperCase() + word.slice(1))
              .join(' ');

            const issueTitle = familyPrefix + ' ' + conclusionLabel + ' (' + today + ')';

            let body = [
              familyMarker,
              '## Workflow Run Alert',
              '',
              '**Date:** ' + today,
              '**Conclusion:** ' + conclusionLabel,
              '**Commit:** [`' + commit + '`](' + commitUrl + ')',
              '**Triggered by:** ' + context.actor,
              '**Workflow:** ' + workflowName,
              '**Run:** [View logs](' + workflowUrl + ')',
            ].join('\n');

            if (extraBody) {
              body += '\n\n' + extraBody;
            }

            body += '\n\n' + [
              '### Action Required',
              '- [ ] Check the [workflow run](' + workflowUrl + ') for error details',
              '- [ ] Fix the root cause or re-run if the conclusion is transient',
              '- [ ] Close this issue when resolved',
              '',
              '---',
              '*Auto-generated by ' + workflowName + '*',
            ].join('\n');

            // Dedup: find existing open issue for the same workflow family
            const duplicate = matchingIssues[0] || null;

            if (duplicate) {
              const commentMarker = `<!-- ci-notify-failure:run-id=${workflowRunId} -->`;
              const { data: existingComments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: duplicate.number,
                per_page: 100,
              });

              const alreadyLogged = existingComments.some(comment =>
                (comment.body || '').includes(commentMarker)
              );

              if (alreadyLogged) {
                core.info('Recurring alert already logged for run #' + workflowRunId + ' on issue #' + duplicate.number);
                return;
              }

              const commentBody = [
                commentMarker,
                '## Recurring Workflow Alert (' + today + ')',
                '',
                '**Conclusion:** ' + conclusionLabel,
                '**Commit:** [`' + commit + '`](' + commitUrl + ')',
                '**Triggered by:** ' + context.actor,
                '**Run:** [View logs](' + workflowUrl + ')',
                '',
                'This workflow reported the same unhealthy conclusion again. See the run logs for details.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: duplicate.number,
                body: commentBody,
              });

              // Assign Codex bot via GraphQL (REST silently ignores bot accounts)
              try {
                await github.graphql(assignMutation, {
                  issueId: duplicate.node_id,
                  assigneeIds: ['BOT_kgDODnSAjQ'],
                });
              } catch (e) {
                core.warning('Failed to assign issue: ' + e.message);
              }

              core.info('Updated existing issue #' + duplicate.number);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels,
              });

              // Assign Codex bot via GraphQL (REST silently ignores bot accounts)
              try {
                await github.graphql(assignMutation, {
                  issueId: created.data.node_id,
                  assigneeIds: ['BOT_kgDODnSAjQ'],
                });
              } catch (e) {
                core.warning('Failed to assign issue: ' + e.message);
              }

              core.info('Created issue #' + created.data.number);
            }
