name: Branch Cleanup (Reusable)

on:
  workflow_call:

permissions:
  contents: write

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba023e95a2965a89232d3dfe59342 # v2.7.0
        with:
          egress-policy: audit

      - name: Delete merged branch
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;

            const protectedBranches = ['main', 'master', 'develop', 'production'];
            if (protectedBranches.includes(branch)) {
              core.info(`Skipping protected branch: ${branch}`);
              return;
            }

            if (pr.head.repo.full_name !== pr.base.repo.full_name) {
              core.info(`Skipping fork branch: ${pr.head.repo.full_name}/${branch}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              core.info(`Deleted branch: ${branch}`);
            } catch (error) {
              if (error.status === 422) {
                core.info(`Branch already deleted: ${branch}`);
              } else {
                core.warning(`Failed to delete branch ${branch}: ${error.message}`);
              }
            }
