# Reusable Dependabot Auto-Fix Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Checks for open Dependabot security alerts that cannot be auto-fixed,
# creates issues with context, and labels them 'opencode-agent' so the OpenCode
# agent pipeline automatically investigates and creates fix PRs.
#
# Usage:
#   jobs:
#     dependabot-fix:
#       uses: qws941/.github/.github/workflows/_dependabot-auto-fix.yml@master

name: Dependabot Auto-Fix (Reusable)

on:
  workflow_call:

jobs:
  check-alerts:
    name: Escalate unfixable Dependabot alerts to Codex
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Check for unfixable Dependabot alerts
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            // Fetch open Dependabot alerts
            let alerts;
            try {
              const response = await github.rest.dependabot.listAlertsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });
              alerts = response.data;
            } catch (error) {
              if (error.status === 403 || error.status === 404) {
                core.info('Dependabot alerts not enabled or accessible for this repo. Skipping.');
                return;
              }
              throw error;
            }

            if (!alerts || alerts.length === 0) {
              core.info('No open Dependabot alerts found.');
              return;
            }

            // Get existing open issues to avoid duplicates
            const openIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'opencode-agent',
              per_page: 100,
            });

            // Get recently closed issues (last 30 days) to avoid reopening
            const since = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
            const closedIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              labels: 'opencode-agent',
              since,
              per_page: 100,
            });

            const allIssueTitles = [
              ...openIssues.data.map(i => i.title),
              ...closedIssues.data.map(i => i.title),
            ];

            // Get open PRs to check for in-flight fixes
            const openPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const prTexts = openPRs.data.map(p =>
              `${p.title} ${p.body || ''}`.toLowerCase()
            );

            // Track packages processed in this run to deduplicate multiple advisories
            const seen = new Set();

            for (const alert of alerts) {
              const pkg = alert.security_vulnerability?.package?.name || alert.dependency?.package?.name || 'unknown';
              const ecosystem = alert.security_vulnerability?.package?.ecosystem || alert.dependency?.package?.ecosystem || '';
              const severity = alert.security_advisory?.severity || 'unknown';
              const summary = alert.security_advisory?.summary || 'No summary available';
              const ghsaId = alert.security_advisory?.ghsa_id || '';
              const cveId = (alert.security_advisory?.cve_id) || '';
              const vulnerableRange = alert.security_vulnerability?.vulnerable_version_range || '';
              const firstPatchedVersion = alert.security_vulnerability?.first_patched_version?.identifier || 'none available';

              // Per-run dedup: one issue per package per run
              if (seen.has(pkg)) {
                core.info(`Already processed ${pkg} in this run. Skipping duplicate alert.`);
                continue;
              }
              seen.add(pkg);

              // Dedup against existing issues by package name (ignores GHSA ID / severity suffix)
              const titlePrefix = `[Dependabot] Fix ${pkg} vulnerability`;
              if (allIssueTitles.some(t => t.startsWith(titlePrefix))) {
                core.info(`Issue already exists for ${pkg} (open or recently closed). Skipping.`);
                continue;
              }

              // Dedup against open PRs already fixing this package
              const pkgLower = pkg.toLowerCase();
              if (prTexts.some(t => t.includes(pkgLower))) {
                core.info(`Open PR already addresses ${pkg}. Skipping issue creation.`);
                continue;
              }

              const issueTitle = `[Dependabot] Fix ${pkg} vulnerability (${severity})`;

              const issueBody = [
                `## Dependabot Security Alert — Manual Fix Required`,
                '',
                `Dependabot cannot automatically resolve this vulnerability. Codex is requested to investigate and create a fix PR.`,
                '',
                `### Alert Details`,
                '',
                `| Field | Value |`,
                `|-------|-------|`,
                `| **Package** | \`${pkg}\` (${ecosystem}) |`,
                `| **Severity** | ${severity} |`,
                `| **Vulnerable range** | \`${vulnerableRange}\` |`,
                `| **First patched version** | \`${firstPatchedVersion}\` |`,
                `| **GHSA** | ${ghsaId ? `[${ghsaId}](https://github.com/advisories/${ghsaId})` : 'N/A'} |`,
                `| **CVE** | ${cveId || 'N/A'} |`,
                '',
                `### Summary`,
                '',
                summary,
                '',
                `### Suggested Fix Steps`,
                '',
                ...(ecosystem === 'npm' ? [
                  `1. Update \`${pkg}\` to \`>=${firstPatchedVersion}\` in \`package.json\` (or add an \`overrides\` entry if a transitive dependency)`,
                  `2. Run \`npm install\` to regenerate \`package-lock.json\``,
                  `3. Verify the resolved version with \`npm ls ${pkg}\``,
                ] : ecosystem === 'pip' ? [
                  `1. Update \`${pkg}\` to \`>=${firstPatchedVersion}\` in \`requirements.txt\` or \`pyproject.toml\``,
                  `2. Run \`pip install -r requirements.txt\` to install the updated dependency`,
                  `3. Verify the resolved version with \`pip show ${pkg}\``,
                ] : ecosystem === 'maven' ? [
                  `1. Update \`${pkg}\` to \`>=${firstPatchedVersion}\` in \`pom.xml\``,
                  `2. Run \`mvn dependency:resolve\` to verify resolution`,
                  `3. Verify the resolved version with \`mvn dependency:tree -Dincludes=${pkg}\``,
                ] : ecosystem === 'nuget' ? [
                  `1. Update \`${pkg}\` to \`>=${firstPatchedVersion}\` in the \`.csproj\` file`,
                  `2. Run \`dotnet restore\` to install the updated dependency`,
                  `3. Verify the resolved version with \`dotnet list package\``,
                ] : ecosystem === 'go' ? [
                  `1. Update \`${pkg}\` to \`>=${firstPatchedVersion}\` with \`go get ${pkg}@v${firstPatchedVersion}\``,
                  `2. Run \`go mod tidy\` to clean up the module file`,
                  `3. Verify the resolved version with \`go list -m ${pkg}\``,
                ] : [
                  `1. Update \`${pkg}\` to \`>=${firstPatchedVersion}\` in the project dependency file`,
                  `2. Install/resolve dependencies using the ecosystem's package manager`,
                  `3. Verify the resolved version`,
                ]),
                `4. Run tests to ensure nothing is broken`,
                `5. Create a PR with the fix`,
                '',
                `### References`,
                '',
                `- [Dependabot alert #${alert.number}](${alert.html_url})`,
              ].join('\n');

              // Create the issue
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['opencode-agent', 'type:security'],
              });

              core.info(`Created issue #${issue.number} for ${pkg}`);

              // Rate limit: small delay between issue creations
              await new Promise(resolve => setTimeout(resolve, 2000));
            }
