# Reusable First Interaction Welcome Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     welcome:
#       uses: qws941/.github/.github/workflows/_welcome.yml@master

name: Welcome (Reusable)

on:
  workflow_call:

jobs:
  welcome:
    name: Welcome first-time contributors
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba023e95a2965a89232d3dfe59342 # v2.7.0
        with:
          egress-policy: audit

      - name: Welcome
        uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo_token: ${{ github.token }}
          issue_message: |
            Thanks for opening your first issue! 🎉
            We'll take a look as soon as possible.
          pr_message: |
            Thanks for your first pull request! 🎉
            We'll review it as soon as possible.
