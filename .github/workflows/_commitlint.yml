# Reusable Commit Lint Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     commitlint:
#       uses: qws941/.github/.github/workflows/_commitlint.yml@master

name: Commit Lint (Reusable)

on:
  workflow_call:

jobs:
  commitlint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba023e95a2965a89232d3dfe59342 # v2.7.0
        with:
          egress-policy: audit

      - name: Validate
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            ci
            chore
            perf
            build
            revert
          requireScope: false
