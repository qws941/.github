# Reusable Commit Lint Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     commitlint:
#       uses: qws941/.github/.github/workflows/_commitlint.yml@master

name: Commit Lint

on:
  workflow_call:

jobs:
  commitlint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            ci
            chore
            perf
            build
            revert
          requireScope: false
