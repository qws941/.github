name: Codex PR Normalize (Reusable)

on:
  workflow_call:

jobs:
  normalize:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'Codex' ||
      github.event.pull_request.user.login == 'codex[bot]' ||
      github.event.pull_request.user.login == 'openai-code-agent[bot]' ||
      github.event.pull_request.user.login == 'chatgpt-codex-connector[bot]' ||
      startsWith(github.event.pull_request.head.ref, 'codex/')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@63c24ba6bd7ba023e95a2965a89232d3dfe59342 # v2.7.0
        with:
          egress-policy: audit

      - name: Normalize PR title and link issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;
            const body = pr.body || '';
            const branch = pr.head.ref;

            const conventionalRe = /^(feat|fix|docs|refactor|test|ci|chore|perf|build|revert)(\(.+\))?!?:\s/;
            const needsTitleFix = !conventionalRe.test(title);

            let newTitle = title;
            if (needsTitleFix) {
              // Determine type from branch prefix
              let type = 'fix';
              if (/^codex\/(add|feat)-/.test(branch)) type = 'feat';
              else if (/^codex\/docs-/.test(branch)) type = 'docs';
              else if (/^codex\/refactor-/.test(branch)) type = 'refactor';
              else if (/^codex\/test-/.test(branch)) type = 'test';
              else if (/^codex\/(ci|workflow)-/.test(branch)) type = 'ci';
              else if (/^codex\/(chore|update)-/.test(branch)) type = 'chore';

              // Strip redundant leading verb, clean trailing period
              let clean = title
                .replace(/^(Fix|Ensure|Resolve|Address|Handle|Add|Update|Remove|Implement|Create)\s+/i, '')
                .replace(/\.+$/, '');

              // Lowercase first char unless it starts an acronym (e.g. ELK, API)
              if (/^[A-Z][a-z]/.test(clean)) {
                clean = clean.charAt(0).toLowerCase() + clean.slice(1);
              }

              newTitle = `${type}: ${clean}`;
            }

            // Find linked issue by keyword matching against codex-labeled issues
            let linkedIssue = null;
            const hasCloseRef = /(?:Closes|Fixes|Resolves)\s+#\d+/i.test(body);

            if (!hasCloseRef) {
              const keywords = branch
                .replace(/^codex\/[a-z]+-/, '')
                .split('-')
                .filter(w => w.length > 2)
                .slice(0, 5);

              if (keywords.length >= 2) {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: 'codex',
                  state: 'open',
                  per_page: 50
                });

                let bestScore = 0;
                for (const issue of issues) {
                  if (issue.pull_request) continue;
                  const words = issue.title.toLowerCase().split(/[\s\-_]+/);
                  const score = keywords.filter(kw =>
                    words.some(w => w.includes(kw) || kw.includes(w))
                  ).length;
                  if (score > bestScore && score >= 2) {
                    bestScore = score;
                    linkedIssue = issue;
                  }
                }
              }
            }

            // Apply updates
            const update = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            };

            let changed = false;

            if (needsTitleFix) {
              update.title = newTitle;
              changed = true;
              console.log(`Title: "${title}" → "${newTitle}"`);
            }

            if (linkedIssue) {
              update.body = `${body}\n\nCloses #${linkedIssue.number}`.trim();
              changed = true;
              console.log(`Linked to issue #${linkedIssue.number}: ${linkedIssue.title}`);
            }

            if (changed) {
              await github.rest.pulls.update(update);
            } else {
              console.log('No changes needed — title is conventional, issue already linked.');
            }

            // Ensure codex + auto-merge labels
            const existing = pr.labels.map(l => l.name);
            const add = ['codex', 'auto-merge'].filter(l => !existing.includes(l));
            if (add.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: add
              });
              console.log(`Added labels: ${add.join(', ')}`);
            }

            // Undraft if PR is a draft — required for auto-merge
            if (pr.draft) {
              await github.graphql(`
                mutation($id: ID!) {
                  markPullRequestReadyForReview(input: { pullRequestId: $id }) {
                    pullRequest { isDraft }
                  }
                }
              `, { id: pr.node_id });
              console.log('Marked PR as ready for review (was draft)');
            }

            // Check PR diff size — block auto-merge for oversized PRs
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const totalChanges = prFiles.reduce((sum, f) => sum + f.changes, 0);

            // Close empty PRs automatically (0 changes)
            if (totalChanges === 0) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                state: 'closed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '🚫 **Empty PR** — This PR contains no changes. Closing automatically.\n\nIf this was unintentional, please re-open with actual changes.',
              });
              console.log('Closed empty PR (0 changes)');
              return;
            }
            if (totalChanges > 500) {
              // Remove auto-merge label for oversized PRs
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: 'auto-merge'
                });
                console.log(`Removed auto-merge label — PR exceeds 500 LOC (${totalChanges})`);
              } catch (e) {
                if (e.status !== 404) throw e;
              }

              // Add warning comment if not already posted
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                per_page: 50,
              });
              const hasWarning = comments.some(c => c.body?.includes('⚠️ **Oversized PR**'));
              if (!hasWarning) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: '⚠️ **Oversized PR** — This PR changes ' + totalChanges + ' lines (threshold: 500). Auto-merge disabled.\n\nPlease review manually or request Codex to split into smaller PRs.'
                });
                console.log(`Added size warning comment (${totalChanges} LOC)`);
              }
            }

            // Detect and close duplicate PRs targeting the same issue
            if (linkedIssue) {
              const { data: allPRs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              const dupeRe = new RegExp(`(?:Closes|Fixes|Resolves)\\s+#${linkedIssue.number}\\b`, 'i');
              const duplicates = allPRs.filter(p =>
                p.number !== pr.number && p.body && dupeRe.test(p.body)
              );

              for (const dup of duplicates) {
                // Close older duplicates, keep the newest
                if (new Date(dup.created_at) < new Date(pr.created_at)) {
                  await github.rest.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: dup.number,
                    state: 'closed',
                  });
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: dup.number,
                    body: `Superseded by #${pr.number} — closing duplicate.`,
                  });
                  console.log(`Closed duplicate PR #${dup.number}`);
                }
              }
            }
