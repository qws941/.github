# Reusable Codex Auto-Issue Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# When an issue is labeled 'codex', posts an @codex comment and assigns
# the Codex bot so the issue appears in the Codex assignee view.
#
# Usage:
#   jobs:
#     codex:
#       uses: qws941/.github/.github/workflows/_codex-auto-issue.yml@master

name: Codex Auto-Issue (Reusable)

on:
  workflow_call:

jobs:
  codex:
    name: Trigger Codex on labeled issues
    runs-on: ubuntu-latest
    if: github.event.label.name == 'codex'
    timeout-minutes: 5
    concurrency:
      group: codex-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Check for existing Codex comment
        id: dedup
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          result-encoding: string
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const hasCodex = comments.data.some(c => c.body.includes('@codex'));
            return hasCodex ? 'skip' : 'proceed';

      - name: Comment and assign Codex
        if: steps.dedup.outputs.result == 'proceed'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const title = context.payload.issue.title;
            const body = context.payload.issue.body || '';
            const commentBody = ['@codex', '', '**Task:** ' + title, '', '**Context:**', body].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody,
            });

            // Assign Codex bot via GraphQL (REST silently ignores bot accounts)
            try {
              const mutation = `mutation($issueId: ID!, $assigneeIds: [ID!]!) {
                addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: $assigneeIds}) {
                  clientMutationId
                }
              }`;
              await github.graphql(mutation, {
                issueId: context.payload.issue.node_id,
                assigneeIds: ['BOT_kgDODnSAjQ'],
              });
            } catch (error) {
              core.warning(`Failed to assign Codex: ${error.message}`);
            }

            // Remove repo owner from assignees (Codex-only policy)
            try {
              const { data: repoData } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              await github.rest.issues.removeAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [repoData.owner.login],
              });
            } catch (error) {
              core.warning(`Failed to remove owner assignee: ${error.message}`);
            }
