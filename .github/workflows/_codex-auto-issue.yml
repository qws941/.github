# Reusable Codex Auto-Issue Workflow
# SSoT: qws941-lab/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     codex:
#       uses: qws941-lab/.github/.github/workflows/_codex-auto-issue.yml@master

name: Codex Auto-Issue

on:
  workflow_call:

jobs:
  codex:
    name: Trigger Codex on labeled issues
    runs-on: ubuntu-latest
    if: github.event.label.name == 'codex'
    timeout-minutes: 5
    concurrency:
      group: codex-issue-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const title = context.payload.issue.title;
            const body = context.payload.issue.body || '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `@codex\n\n**Task:** ${title}\n\n**Context:**\n${body}`
            });
