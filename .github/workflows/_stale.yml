# Reusable Stale Issues/PRs Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     stale:
#       uses: qws941/.github/.github/workflows/_stale.yml@master

name: Stale (Reusable)

on:
  workflow_call:

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Stale
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had recent activity. It will be closed in 5 days if no further
            activity occurs. If this issue is still relevant, please comment
            to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not
            had recent activity. It will be closed in 5 days if no further
            activity occurs. If this PR is still relevant, please comment or
            push changes to keep it open.
          days-before-stale: 14
          days-before-close: 5
          stale-issue-label: 'status:stale'
          stale-pr-label: 'status:stale'
          exempt-issue-labels: 'keep-open,pinned,type:security'
          exempt-pr-labels: 'keep-open,pinned,type:security'
          remove-stale-when-updated: true
