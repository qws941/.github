name: Codex Issue Timeout (Reusable)

on:
  workflow_call:

jobs:
  timeout:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Close stale codex issues
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const TIMEOUT_MS = 72 * 60 * 60 * 1000;
            const now = Date.now();

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'codex',
              state: 'open',
              per_page: 100
            });

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            let closed = 0;
            for (const issue of issues) {
              if (issue.pull_request) continue;
              if (now - new Date(issue.created_at).getTime() < TIMEOUT_MS) continue;

              // Skip if an open PR references this issue
              const hasLinkedPR = prs.some(pr =>
                (pr.body || '').match(
                  new RegExp(`(?:Closes|Fixes|Resolves)\\s+#${issue.number}\\b`, 'i')
                )
              );
              if (hasLinkedPR) {
                console.log(`#${issue.number}: has open PR, skipping`);
                continue;
              }

              // Check if Codex signaled no-fix in last comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 10
              });

              const last = comments[comments.length - 1];
              const codexActors = ['Codex', 'openai-code-agent[bot]', 'chatgpt-codex-connector[bot]'];
              const codexNoFix = last &&
                codexActors.includes(last.user.login) &&
                /cannot|unable|infrastructure|manual|not possible|out of scope/i.test(last.body);

              const reason = codexNoFix
                ? 'Codex determined this requires manual intervention.'
                : `No automated resolution within ${TIMEOUT_MS / 3600000}h.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `🤖 **Auto-closed**: ${reason}\n\nReopen if manual action is needed.`
              });

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'codex'
                });
              } catch (e) {
                // Label may already be removed
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['status:wontfix']
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });

              closed++;
              console.log(`Closed #${issue.number}: ${reason}`);
            }

            console.log(`Total closed: ${closed} stale codex issues`);
