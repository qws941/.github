# Reusable Auto-Approve Runs Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
#
# Required secrets:
#   - GH_PAT: GitHub PAT with actions:write permission

name: Auto Approve Runs (Reusable)

on:
  workflow_call:

jobs:
  approve:
    name: Approve pending runs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for workflow runs to queue
        run: sleep 15

      - name: Rerun action_required runs and stale failures
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let rerunPending = 0;
            let rerunFailed = 0;
            const eventName = context.eventName;
            const pullRequest = context.payload.pull_request;
            const prNumber = pullRequest?.number;

            const trustedActors = new Set([
              'github-actions[bot]',
              'dependabot[bot]',
              'chatgpt-codex-connector[bot]',
              'openai-code-agent[bot]',
              'codex[bot]',
              'Codex',
              context.repo.owner,
            ]);
            const prEvents = new Set(['pull_request', 'pull_request_target']);
            const workflowEventAllowlist = new Map([
              ['Auto Merge', new Set(['pull_request_target'])],
              ['Auto Approve Runs', new Set(['pull_request_target', 'workflow_dispatch', 'schedule'])],
              ['Codex PR Normalize', new Set(['pull_request_target'])],
              ['Codex PR Review', new Set(['pull_request'])],
              ['Commit Lint', new Set(['pull_request_target'])],
              ['Issue Lifecycle', new Set(['pull_request'])],
              ['PR Labeler', new Set(['pull_request_target'])],
              ['PR Size', new Set(['pull_request_target'])],
              ['Welcome', new Set(['pull_request_target'])],
            ]);

            const isTrustedRun = run => trustedActors.has(run.actor?.login);
            const hasPrLink = run => !Array.isArray(run.pull_requests) || run.pull_requests.length > 0;
            const isManagedPrRun = run => {
              const allowedEvents = workflowEventAllowlist.get(run.name) || prEvents;
              return allowedEvents.has(run.event) && hasPrLink(run);
            };
            const allowedNames = new Set([
              'Auto Merge',
              'Codex PR Normalize',
              'Codex PR Review',
              'Commit Lint',
              'Issue Lifecycle',
              'PR Labeler',
              'PR Size',
              'Welcome',
            ]);
            const isTargetRun = run =>
              allowedNames.has(run.name) &&
              isTrustedRun(run) &&
              run.conclusion === 'action_required' &&
              Array.isArray(run.pull_requests) &&
              run.pull_requests.some(pr => pr.number === prNumber);
            const unblockActionRequiredRun = async run => {
              try {
                await github.rest.actions.approveWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                rerunPending++;
                core.info(`Approved action_required run #${run.id} (${run.name})`);
                return;
              } catch (e) {
                const message = String(e.message || '');
                if (!message.includes('not from a fork pull request')) {
                  core.warning(`Failed to approve action_required run #${run.id}: ${message}`);
                  return;
                }
              }

              try {
                await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
                  owner,
                  repo,
                  run_id: run.id,
                });
                rerunPending++;
                core.info(`Reran action_required run #${run.id} (${run.name})`);
              } catch (e) {
                core.warning(`Failed to rerun action_required run #${run.id}: ${e.message}`);
              }
            };
            const rerunCancelledAutoMerge = async run => {
              try {
                await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun', {
                  owner,
                  repo,
                  run_id: run.id,
                });
                rerunFailed++;
                core.info(`Reran cancelled Auto Merge run #${run.id} (${run.name})`);
              } catch (e) {
                core.warning(`Failed to rerun cancelled Auto Merge run #${run.id}: ${e.message}`);
              }
            };

            if (eventName === 'pull_request_target' && prNumber) {
              try {
                const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                  owner,
                  repo,
                  per_page: 100,
                });

                for (const run of runs.workflow_runs.filter(isTargetRun)) {
                  await unblockActionRequiredRun(run);
                }
              } catch (e) {
                core.warning(`Failed to inspect PR-linked workflow runs for #${prNumber}: ${e.message}`);
              }

              core.info(`Done: ${rerunPending} action_required approved, ${rerunFailed} failure rerun`);
              return;
            }

            // Rerun action_required runs (approve API only works for fork PRs)
            try {
              const { data: pendingRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                status: 'action_required',
                per_page: 100,
              });

              for (const run of pendingRuns.workflow_runs.filter(r => r.name !== 'Auto Approve Runs' && isTrustedRun(r) && isManagedPrRun(r))) {
                await unblockActionRequiredRun(run);
              }
            } catch (e) {
              core.warning(`Failed to list action_required runs: ${e.message}`);
            }

            // Rerun stale failures from the last 24h
            const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
            try {
              const { data: failedRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                status: 'failure',
                created: `>=${since}`,
                per_page: 50,
              });


              const eligibleRuns = failedRuns.workflow_runs.filter(
                r => r.name !== 'Auto Approve Runs' && isTrustedRun(r) && isManagedPrRun(r)
              );

              for (const run of eligibleRuns) {
                if (run.run_attempt > 1) continue;
                try {
                  await github.rest.actions.reRunWorkflowFailedJobs({
                    owner,
                    repo,
                    run_id: run.id,
                  });
                  rerunFailed++;
                  core.info(`Rerun failed jobs for run #${run.id} (${run.name})`);
                } catch (e) {
                  core.warning(`Failed to rerun #${run.id}: ${e.message}`);
                }
              }
            } catch (e) {
              core.warning(`Failed to list failed runs: ${e.message}`);
            }

            try {
              const { data: cancelledRuns } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                status: 'completed',
                per_page: 100,
                created: `>=${since}`,
              });

              const eligibleCancelledRuns = cancelledRuns.workflow_runs.filter(run =>
                run.name === 'Auto Merge' &&
                run.conclusion === 'cancelled' &&
                run.run_attempt === 1 &&
                isTrustedRun(run) &&
                isManagedPrRun(run)
              );

              for (const run of eligibleCancelledRuns) {
                await rerunCancelledAutoMerge(run);
              }
            } catch (e) {
              core.warning(`Failed to list cancelled Auto Merge runs: ${e.message}`);
            }

            core.info(`Done: ${rerunPending} action_required approved, ${rerunFailed} failure rerun`);
