# Reusable Auto-Merge Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Uses --auto to queue merge pending CI status checks.
# This prevents merging broken PRs (e.g., Codex fixes that fail CI).
#
# Usage:
#   jobs:
#     auto-merge:
#       uses: qws941/.github/.github/workflows/_auto-merge.yml@master
#       secrets: inherit
#
# Required secrets:
#   - GH_PAT: GitHub Personal Access Token with repo permissions

name: Auto Merge (Reusable)

on:
  workflow_call:

jobs:
  auto-merge:
    name: Auto-merge eligible PRs
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == github.repository_owner ||
      contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
      contains(github.event.pull_request.labels.*.name, 'sync')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Reconcile auto-merge state
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const { repository } = await github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    number
                    url
                    state
                    isDraft
                    mergeable
                    mergeStateStatus
                    reviewDecision
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `, { owner, repo, number: pull_number });

            const pr = repository.pullRequest;
            if (!pr) {
              throw new Error(`Pull request #${pull_number} not found`);
            }

            if (pr.state !== 'OPEN') {
              core.notice(`No-op: PR #${pull_number} is ${pr.state}`);
              return;
            }

            if (pr.autoMergeRequest) {
              core.notice(`No-op: auto-merge already enabled for PR #${pull_number}`);
              return;
            }

            const humanBlockers = [];
            if (pr.isDraft) humanBlockers.push('PR is draft');
            if (pr.mergeable === 'CONFLICTING' || pr.mergeStateStatus === 'DIRTY') {
              humanBlockers.push('merge conflict requires manual resolution');
            }
            if (pr.mergeStateStatus === 'BEHIND') {
              humanBlockers.push('branch is behind base and needs update');
            }
            if (pr.reviewDecision === 'CHANGES_REQUESTED') {
              humanBlockers.push('changes requested review is blocking merge');
            }

            if (humanBlockers.length > 0) {
              const msg = '⚠️ **Auto-merge blocked** — ' + humanBlockers.join('; ') + '.\n\nManual attention required.';
              core.notice(msg);

              // Comment on PR so the blocker is visible
              try {
                const { data: comments } = await github.rest.issues.listComments({
                  owner, repo, issue_number: pull_number, per_page: 50,
                });
                const hasBlocker = comments.some(c => c.body?.includes('⚠️ **Auto-merge blocked**'));
                if (!hasBlocker) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: pull_number, body: msg,
                  });
                }
              } catch (e) {
                core.warning(`Failed to comment blocker on PR: ${e.message}`);
              }

              return;
            }

            try {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number,
                event: 'APPROVE',
              });
              core.notice(`Approved PR #${pull_number}`);
            } catch (e) {
              const message = String(e.message || '');
              if (e.status === 422 || /approve your own pull request|review already exists|pending review/i.test(message)) {
                core.notice(`Approval step skipped: ${message}`);
              } else {
                throw e;
              }
            }

            try {
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                    pullRequest {
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `, { pullRequestId: pr.id });
              core.notice(`Enabled auto-merge for PR #${pull_number}`);
            } catch (e) {
              const message = String(e.message || '');
              if (/draft|merge conflict|changes requested|review|required review|behind|base branch policy|not in clean status|cannot enable auto-merge|unstable/i.test(message)) {
                core.notice(`Human attention: ${message}`);
                return;
              }
              throw e;
            }
