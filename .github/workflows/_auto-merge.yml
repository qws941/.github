# Reusable Auto-Merge Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Uses --auto to queue merge pending CI status checks.
# This prevents merging broken PRs (e.g., Codex fixes that fail CI).
#
# Usage:
#   jobs:
#     auto-merge:
#       uses: qws941/.github/.github/workflows/_auto-merge.yml@master
#       secrets: inherit
#
# Required secrets:
#   - GH_PAT: GitHub Personal Access Token with repo permissions

name: Auto Merge

on:
  workflow_call:

jobs:
  auto-merge:
    name: Auto-merge eligible PRs
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      github.event.pull_request.user.login == 'chatgpt-codex-connector[bot]' ||
      github.event.pull_request.user.login == 'openai-code-agent[bot]' ||
      github.event.pull_request.user.login == 'Codex' ||
      github.event.pull_request.user.login == github.repository_owner ||
      contains(github.event.pull_request.labels.*.name, 'auto-merge') ||
      contains(github.event.pull_request.labels.*.name, 'codex') ||
      contains(github.event.pull_request.labels.*.name, 'sync')
    steps:
      - name: Approve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --approve

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --squash --auto
