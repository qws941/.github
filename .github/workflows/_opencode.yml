# Reusable OpenCode Agent Workflow
# SSoT: qws941-lab/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     opencode:
#       uses: qws941-lab/.github/.github/workflows/_opencode.yml@master
#       secrets: inherit
#
# Required secrets:
#   - ANTHROPIC_API_KEY: API key for the AI model
#
# Note: anomalyco/opencode/github does not publish SHA-pinned releases.
# TODO: Pin to SHA when available.

name: OpenCode

on:
  workflow_call:

jobs:
  opencode:
    name: Run OpenCode agent
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          use_github_token: true
          share: false
