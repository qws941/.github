# CI Notify Failure
# SSoT: qws941-lab/.github — synced to all repos
# Synced via: .github/sync.yml
# Template: _ci-notify-failure.yml
#
# Creates a GitHub Issue when the CI workflow fails.
# Customize the 'workflows' list per-repo if your CI workflow has a different name.

name: CI Notify Failure

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  issues: write

jobs:
  notify:
    if: github.event.workflow_run.conclusion == 'failure'
    uses: qws941-lab/.github/.github/workflows/_ci-notify-failure.yml@master
