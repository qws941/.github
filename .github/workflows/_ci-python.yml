# Reusable Python CI Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     ci:
#       uses: qws941/.github/.github/workflows/_ci-python.yml@master
#       with:
#         python-version: '3.11'
#         run-mypy: true
#         run-test: true
#       secrets: inherit

name: Python CI (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version'
        required: false
        type: string
        default: '3.11'
      working-directory:
        description: 'Working directory for commands'
        required: false
        type: string
        default: '.'
      src-dirs:
        description: 'Space-separated source directories for ruff'
        required: false
        type: string
        default: 'src/ tests/'
      run-mypy:
        description: 'Run mypy type checking'
        required: false
        type: boolean
        default: false
      run-test:
        description: 'Run pytest'
        required: false
        type: boolean
        default: false
      mypy-dirs:
        description: 'Directories for mypy to check'
        required: false
        type: string
        default: 'src/'
      test-dirs:
        description: 'Directories for pytest'
        required: false
        type: string
        default: 'tests/'
      install-command:
        description: 'Command to install project dependencies (empty = pip install -e ".[dev]")'
        required: false
        type: string
        default: ''

jobs:
  ci:
    name: Python CI
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check ${{ inputs.src-dirs }}

      - name: Ruff format check
        run: ruff format --check ${{ inputs.src-dirs }}

      - name: Install dependencies
        if: inputs.run-mypy || inputs.run-test
        run: ${{ inputs.install-command || 'pip install -e ".[dev]"' }}

      - name: Mypy
        if: inputs.run-mypy
        run: mypy ${{ inputs.mypy-dirs }}
        continue-on-error: true

      - name: Pytest
        if: inputs.run-test
        run: pytest ${{ inputs.test-dirs }} -v --tb=short
