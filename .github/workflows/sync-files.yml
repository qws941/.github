name: Sync Common Files

on:
  push:
    branches: [master]
    paths:
      - 'OWNERS'
      - 'AGENTS.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.github/sync.yml'
      - '.github/labeler.yml'
      - '.github/release-drafter.yml'
      - '.github/workflows/stale.yml'
      - '.github/workflows/labeler.yml'
      - '.github/workflows/auto-merge.yml'
      - '.github/workflows/codex-triage.yml'
      - '.github/workflows/welcome.yml'
      - '.github/workflows/lock-threads.yml'
      - '.github/workflows/commitlint.yml'
      - '.github/workflows/pr-size.yml'
      - '.github/workflows/release-drafter.yml'
      - '.github/workflows/codex-auto-issue.yml'
      - '.github/workflows/opencode.yml'
      - '.github/workflows/issue-lifecycle.yml'
      - '.github/workflows/ci-notify-failure.yml'
      - '.github/workflows/auto-approve-runs.yml'
      - '.github/FUNDING.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/ISSUE_TEMPLATE/bug_report.yml'
      - '.github/ISSUE_TEMPLATE/feature_request.yml'
      - '.github/ISSUE_TEMPLATE/issue-form.yml'
      - '.github/ISSUE_TEMPLATE/config.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sync files
        uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1.21.1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
          COMMIT_PREFIX: "chore: "
          PR_LABELS: "sync"
          ASSIGNEES: "${{ github.repository_owner }}"
          COMMIT_EACH_FILE: false
