name: Sync Common Files

on:
  push:
    branches: [master]
    paths:
      # Governance
      - 'OWNERS'
      - 'LICENSE'
      - '.editorconfig'
      # GitHub config
      - '.github/sync.yml'
      - '.github/FUNDING.yml'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/labeler.yml'
      - '.github/release-drafter.yml'
      # Issue templates
      - '.github/ISSUE_TEMPLATE/*'
      # Workflow callers (alphabetical)
      - '.github/workflows/auto-approve-runs.yml'
      - '.github/workflows/auto-merge.yml'
      - '.github/workflows/automation-health.yml'
      - '.github/workflows/branch-cleanup.yml'
      - '.github/workflows/ci-notify-failure.yml'
      - '.github/workflows/commitlint.yml'
      - '.github/workflows/dependabot-auto-fix.yml'
      - '.github/workflows/issue-duplicate.yml'
      - '.github/workflows/issue-label.yml'
      - '.github/workflows/issue-lifecycle.yml'
      - '.github/workflows/issue-project.yml'
      - '.github/workflows/issue-sla.yml'
      - '.github/workflows/labeler.yml'
      - '.github/workflows/lock-threads.yml'
      - '.github/workflows/opencode-agent-timeout.yml'
      - '.github/workflows/opencode-issue-sync.yml'
      - '.github/workflows/opencode-pr-sync.yml'
      - '.github/workflows/opencode-writeback.yml'
      - '.github/workflows/pr-normalize.yml'
      - '.github/workflows/pr-size.yml'
      - '.github/workflows/release-drafter.yml'
      - '.github/workflows/stale.yml'
      - '.github/workflows/welcome.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without applying'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        if: ${{ inputs.dry_run == true }}
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.22'

      - name: Preview sync
        if: ${{ inputs.dry_run == true }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: go run scripts/preview-sync.go

      - name: Sync files
        if: ${{ inputs.dry_run != true }}
        uses: BetaHuhn/repo-file-sync-action@8b92be3375cf1d1b0cd579af488a9255572e4619 # v1.21.1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
          COMMIT_PREFIX: "chore: "
          PR_LABELS: "sync"
          COMMIT_EACH_FILE: false
          SKIP_PR: true
