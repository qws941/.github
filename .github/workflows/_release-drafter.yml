# Reusable Release Drafter Workflow
# SSoT: qws941/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     draft:
#       uses: qws941/.github/.github/workflows/_release-drafter.yml@master

name: Release Drafter (Reusable)

on:
  workflow_call:

jobs:
  draft:
    name: Draft release notes
    runs-on: ubuntu-latest
    concurrency:
      group: release-drafter
      cancel-in-progress: true
    steps:
      - name: Draft
        uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7 # v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}
