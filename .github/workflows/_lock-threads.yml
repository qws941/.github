# Reusable Lock Threads Workflow
# SSoT: qws941-lab/.github — do not duplicate in consuming repos
#
# Usage:
#   jobs:
#     lock:
#       uses: qws941-lab/.github/.github/workflows/_lock-threads.yml@master

name: Lock Threads

on:
  workflow_call:

jobs:
  lock:
    name: Lock inactive threads
    runs-on: ubuntu-latest
    concurrency:
      group: lock-threads
      cancel-in-progress: false
    steps:
      - name: Lock threads
        uses: dessant/lock-threads@1bf7ec25051fe7c00bdd17e6a7cf3d7bfb7dc771 # v5
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: 30
          issue-lock-reason: resolved
          pr-inactive-days: 30
          pr-lock-reason: resolved
          issue-comment: >
            This issue has been automatically locked since there has not been
            any recent activity after it was closed. Please open a new issue
            for related bugs or feature requests.
          pr-comment: >
            This PR has been automatically locked since there has not been
            any recent activity after it was closed. Please open a new issue
            or PR for related changes.
