# File Sync Configuration
# SSoT: qws941/.github — changes here auto-sync to all repos via PR
# Docs: https://github.com/BetaHuhn/repo-file-sync-action
#
# Architecture:
#   - Reusable templates (_*.yml) live ONLY in this repo (not synced)
#   - Thin callers (*.yml) are synced to all repos via this config
#   - Callers reference templates via: uses: qws941/.github/.github/workflows/_*.yml@master
#
# Synced files (truly common across all repos):
#   - OWNERS, LICENSE, .editorconfig (governance)
#   - AGENTS.md (project knowledge base)
#   - .github/FUNDING.yml, PULL_REQUEST_TEMPLATE.md (community)
#   - .github/ISSUE_TEMPLATE/* (bug report, feature request, issue form, config)
#   - .github/labeler.yml, release-drafter.yml (PR config)
#   - .github/workflows/* (thin callers for all shared workflows)
#
# NOT synced (repo-specific):
#   - .github/dependabot.yml  (different ecosystems per repo)
#   - .github/CODEOWNERS      (terraform has custom rules)
#   - .github/workflows/_*.yml (reusable templates, consumed cross-repo)

group:
  # Group 1: Core governance + workflow callers → all owned repos
  - files:
      - source: OWNERS
        dest: OWNERS
      - source: LICENSE
        dest: LICENSE
      - source: .editorconfig
        dest: .editorconfig
      - source: AGENTS.md
        dest: AGENTS.md
      - source: .github/labeler.yml
        dest: .github/labeler.yml
      - source: .github/release-drafter.yml
        dest: .github/release-drafter.yml
      - source: .github/FUNDING.yml
        dest: .github/FUNDING.yml
      - source: .github/PULL_REQUEST_TEMPLATE.md
        dest: .github/PULL_REQUEST_TEMPLATE.md
      - source: .github/ISSUE_TEMPLATE/bug_report.yml
        dest: .github/ISSUE_TEMPLATE/bug_report.yml
      - source: .github/ISSUE_TEMPLATE/feature_request.yml
        dest: .github/ISSUE_TEMPLATE/feature_request.yml
      - source: .github/ISSUE_TEMPLATE/issue-form.yml
        dest: .github/ISSUE_TEMPLATE/issue-form.yml
      - source: .github/ISSUE_TEMPLATE/config.yml
        dest: .github/ISSUE_TEMPLATE/config.yml
      - source: .github/workflows/stale.yml
        dest: .github/workflows/stale.yml
      - source: .github/workflows/labeler.yml
        dest: .github/workflows/labeler.yml
      - source: .github/workflows/codex-triage.yml
        dest: .github/workflows/codex-triage.yml
      - source: .github/workflows/welcome.yml
        dest: .github/workflows/welcome.yml
      - source: .github/workflows/lock-threads.yml
        dest: .github/workflows/lock-threads.yml
      - source: .github/workflows/commitlint.yml
        dest: .github/workflows/commitlint.yml
      - source: .github/workflows/pr-size.yml
        dest: .github/workflows/pr-size.yml
      - source: .github/workflows/release-drafter.yml
        dest: .github/workflows/release-drafter.yml
      - source: .github/workflows/auto-merge.yml
        dest: .github/workflows/auto-merge.yml
      - source: .github/workflows/codex-auto-issue.yml
        dest: .github/workflows/codex-auto-issue.yml
      - source: .github/workflows/issue-lifecycle.yml
        dest: .github/workflows/issue-lifecycle.yml
      - source: .github/workflows/ci-notify-failure.yml
        dest: .github/workflows/ci-notify-failure.yml
      - source: .github/workflows/auto-approve-runs.yml
        dest: .github/workflows/auto-approve-runs.yml
      - source: .github/workflows/dependabot-auto-fix.yml
        dest: .github/workflows/dependabot-auto-fix.yml
      - source: .github/workflows/codex-pr-normalize.yml
        dest: .github/workflows/codex-pr-normalize.yml
      - source: .github/workflows/codex-issue-timeout.yml
        dest: .github/workflows/codex-issue-timeout.yml
      - source: .github/workflows/branch-cleanup.yml
        dest: .github/workflows/branch-cleanup.yml
      - source: .github/workflows/codex-pr-review.yml
        dest: .github/workflows/codex-pr-review.yml
      - source: .github/workflows/issue-label.yml
        dest: .github/workflows/issue-label.yml
    repos: |
      qws941/aimo3-prize
      qws941/blacklist
      qws941/hycu_fsds
      qws941/opencode
      qws941/propose
      qws941/qws941
      qws941/resume
