# File Sync Configuration
# SSoT: qws941/.github — changes here auto-sync to all repos via PR
# Docs: https://github.com/BetaHuhn/repo-file-sync-action
#
# Synced files (truly common across all repos):
#   - OWNERS, LICENSE, .editorconfig (governance)
#   - .github/labeler.yml (PR auto-labeling)
#   - .github/workflows/stale.yml (stale issue cleanup)
#   - .github/workflows/labeler.yml (labeler workflow)
#
# NOT synced (repo-specific):
#   - .github/dependabot.yml  (different ecosystems per repo)
#   - .github/CODEOWNERS      (terraform/opencode have custom rules)
#   - .github/copilot-instructions.md (repo-specific context)

group:
  # Core governance + workflows → all owned repos
  - files:
      - source: OWNERS
        dest: OWNERS
      - source: LICENSE
        dest: LICENSE
      - source: .editorconfig
        dest: .editorconfig
      - source: .github/labeler.yml
        dest: .github/labeler.yml
      - source: .github/workflows/stale.yml
        dest: .github/workflows/stale.yml
      - source: .github/workflows/labeler.yml
        dest: .github/workflows/labeler.yml
    repos: |
      qws941/blacklist
      qws941/claude
      qws941/hycu_fsds
      qws941/propose
      qws941/resume
      qws941/safework2
      qws941/splunk
      qws941/terraform
      qws941/tmux
      qws941/youtube

  # opencode is a fork — sync OWNERS + .editorconfig + workflows only (not LICENSE)
  - files:
      - source: OWNERS
        dest: OWNERS
      - source: .editorconfig
        dest: .editorconfig
      - source: .github/labeler.yml
        dest: .github/labeler.yml
      - source: .github/workflows/stale.yml
        dest: .github/workflows/stale.yml
      - source: .github/workflows/labeler.yml
        dest: .github/workflows/labeler.yml
    repos: |
      qws941/opencode
