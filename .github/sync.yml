# File Sync Configuration
# SSoT: qws941/.github — changes here auto-sync to all repos via PR
# Docs: https://github.com/BetaHuhn/repo-file-sync-action
#
# NOT synced (repo-specific):
#   - .github/dependabot.yml  (different ecosystems per repo)
#   - .github/CODEOWNERS      (terraform/opencode have custom rules)

group:
  # OWNERS + LICENSE + .editorconfig → all owned repos
  - files:
      - source: OWNERS
        dest: OWNERS
      - source: LICENSE
        dest: LICENSE
      - source: .editorconfig
        dest: .editorconfig
    repos: |
      qws941/blacklist
      qws941/claude
      qws941/hycu_fsds
      qws941/propose
      qws941/resume
      qws941/safework2
      qws941/splunk
      qws941/terraform
      qws941/tmux
      qws941/youtube

  # opencode is a fork — sync OWNERS + .editorconfig only (not LICENSE)
  - files:
      - source: OWNERS
        dest: OWNERS
      - source: .editorconfig
        dest: .editorconfig
    repos: |
      qws941/opencode
