# File Sync Configuration
# SSoT: qws941/.github — changes here auto-sync to all repos via PR
# Docs: https://github.com/BetaHuhn/repo-file-sync-action
#
# Synced files (truly common across all repos):
#   - OWNERS, LICENSE, .editorconfig (governance)
#   - .github/labeler.yml (PR auto-labeling)
#   - .github/workflows/stale.yml (stale issue cleanup)
#   - .github/workflows/labeler.yml (labeler workflow)
#   - .github/workflows/auto-merge.yml (dependabot/owner/codex auto-merge)
#   - .github/workflows/codex-auto-issue.yml (codex issue automation)
#
# NOT synced (repo-specific):
#   - .github/dependabot.yml  (different ecosystems per repo)
#   - .github/CODEOWNERS      (terraform has custom rules)
#   - .github/copilot-instructions.md (repo-specific context)

group:
  # Group 1: Core governance + workflows → all owned repos
  - files:
      - source: OWNERS
        dest: OWNERS
      - source: LICENSE
        dest: LICENSE
      - source: .editorconfig
        dest: .editorconfig
      - source: .github/labeler.yml
        dest: .github/labeler.yml
      - source: .github/workflows/stale.yml
        dest: .github/workflows/stale.yml
      - source: .github/workflows/labeler.yml
        dest: .github/workflows/labeler.yml
    repos: |
      qws941/blacklist
      qws941/hycu_fsds
      qws941/propose
      qws941/qws941
      qws941/resume
      qws941/safetywallet
      qws941/splunk
      qws941/terraform
      qws941/tmux
      qws941/youtube

  # Group 2: Auto-merge → all repos except terraform (has custom risk-based auto-merge)
  - files:
      - source: .github/workflows/auto-merge.yml
        dest: .github/workflows/auto-merge.yml
    repos: |
      qws941/blacklist
      qws941/hycu_fsds
      qws941/propose
      qws941/qws941
      qws941/resume
      qws941/safetywallet
      qws941/splunk
      qws941/tmux
      qws941/youtube

  # Group 3: Codex auto-issue → all repos (generic, no repo-specific logic)
  - files:
      - source: .github/workflows/codex-auto-issue.yml
        dest: .github/workflows/codex-auto-issue.yml
    repos: |
      qws941/blacklist
      qws941/hycu_fsds
      qws941/propose
      qws941/qws941
      qws941/resume
      qws941/safetywallet
      qws941/splunk
      qws941/terraform
      qws941/tmux
      qws941/youtube
